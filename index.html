<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naser Aljed | Cybersecurity Student</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #e0ecff, #f8fbff);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #111827;
        }

        .card {
            background-color: white;
            width: 360px;
            padding: 30px 25px;
            border-radius: 18px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
            text-align: center;
            transition: 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #dbeafe;
            margin-bottom: 15px;
        }

        h1 {
            margin: 10px 0 5px;
            font-size: 28px;
            color: #2563eb;
        }

        .role {
            margin: 0 0 20px;
            font-size: 16px;
            color: #4b5563;
        }

        h2 {
            margin-bottom: 10px;
            font-size: 20px;
            color: #1f2937;
        }

        .about {
            font-size: 15px;
            line-height: 1.6;
            color: #374151;
            margin-bottom: 20px;
        }

        .contact {
            margin-bottom: 25px;
            font-size: 14px;
        }

        .contact a {
            color: #2563eb;
            text-decoration: none;
        }

        .contact a:hover {
            text-decoration: underline;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: inline-block;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            background-color: #2563eb;
            color: white;
            font-weight: bold;
            transition: 0.2s ease;
        }

        .btn:hover {
            background-color: #1d4ed8;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="profile.jpg" alt="Profile photo of Naser" class="profile-img">

        <h1>Naser Aljed</h1>
        <p class="role">Cybersecurity Student</p>

        <h2>About Me</h2>
        <p class="about">
            I am learning cybersecurity and building my first website.
            I am also interested in secure coding and safe CI/CD pipelines.
        </p>

        <p class="contact">
            Contact:
            <a href="mailto:your_email@example.com">Naser.aljed@gmail.com</a>
        </p>

        <div class="buttons">
            <a class="btn" href="https://www.google.com" target="_blank" rel="noopener noreferrer">Open Google</a>
            <a class="btn" href="https://github.com/naseraljed-star" target="_blank" rel="noopener noreferrer">My GitHub</a>
            <a href="https://www.linkedin.com" class="btn">My LinkedIn</a>
           
        </div>
    </div>

</body>
</html>
