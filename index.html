<!DOCTYPE html>
<html>
<head>

    <style>
        body {

            text-align: center;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            color: #2563eb;
        }

        .card {
            background-color: white;
            padding: 20px;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        button {
            padding: 10px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #2563eb;
            color: white;
        }

        a {
            color: #2563eb;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="card">
    <img src="profile.jpg" width="120" style="border-radius:50%;">

    <h1>Naser Aljed</h1>
    <p>Cybersecurity Student</p>

    <h2>About me</h2>
    <p>I am learning cybersecurity and building my first website</p>

    <p>Contact: <a href="mailto:your_email@example.com">your_email@example.com</a></p>

    <a href="https://www.google.com" target="_blank">
        <button>Open Google</button>
    </a>

    <a href="https://github.com/naseraljed-star" target="_blank">
        <button>My GitHub</button>
    </a>
</div>

</html>
