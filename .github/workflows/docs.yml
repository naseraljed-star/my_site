name: Generate Docs

on:
  workflow_run:
    workflows: ["Security Check"]
    types:
      - completed

permissions:
  contents: write

jobs:
  docs:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create docs folder
        run: mkdir -p docs

      - name: Call OpenAI API
        run: |
          # Read and escape HTML content
          CONTENT=$(cat index.html | jq -Rs .)
          
          # Create the JSON payload using jq
          jq -n \
            --arg content "$CONTENT" \
            '{
              model: "gpt-4o-mini",
              messages: [
                {
                  role: "user",
                  content: "Read this website code and generate a short developer guide in Markdown only.\n\nImportant instructions:\n- Use exact visible labels from the HTML.\n- Do not replace exact labels with general words.\n- Do not invent features or steps that are not present in the HTML.\n- The Mermaid flowchart must show the user journey in sequence, starting from landing on the homepage, then viewing the profile content, then reaching the available action buttons or links.\n- If multiple buttons or links exist, show them as separate branches from one decision step.\n- Use the exact button and link labels as they appear in the HTML.\n- Include ALL buttons or links found in the HTML exactly as written.\n- Do not limit the flowchart to fixed examples.\n- Do not create isolated mini-flows. Keep one connected flowchart.\n\nReturn this structure only:\n# Developer Guide\n\n## 1. Project Overview\n## 2. Language Used\n## 3. Website Purpose\n## 4. User Flow\n\nUnder \"User Flow\", return a Mermaid flowchart only.\n\nHere is the code:\n\n" + $content
                }
              ],
              max_tokens: 2000,
              temperature: 0.7
            }' > docs/request.json

          # Make the API call
          curl -s https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d @docs/request.json > docs/output.json
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Generate file
        run: |
          TEXT=$(jq -r '.choices[0].message.content // empty' docs/output.json)
          
          if [ -n "$TEXT" ] && [ "$TEXT" != "null" ]; then
            echo "$TEXT" > docs/developer-guide.md
            echo "✅ Success!"
          else
            echo "❌ Failed"
            cat docs/output.json
            exit 1
          fi

      - name: Fix Mermaid formatting
        run: |
          sed -i 's/``` mermaid/```mermaid/g' docs/developer-guide.md

      - name: Commit file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/developer-guide.md docs/request.json docs/output.json
          git commit -m "update developer guide" || echo "no changes"
          git push
