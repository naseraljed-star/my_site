name: Generate Docs

on:
  workflow_run:
    workflows: ["Security Check"]
    types:
      - completed

permissions:
  contents: write

jobs:
  docs:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create docs folder
        run: mkdir -p docs

      - name: Call OpenAI API
        run: |
          CONTENT=$(cat index.html)

          jq -n --arg content "$CONTENT" '{
            model: "gpt-4o-mini",
            input: [
              {
                role: "user",
                content: [
                  {
                    type: "input_text",
                    text: ("Read this website code and generate a short developer guide with: 1) project overview, 2) language used, 3) website purpose, 4) a Mermaid flowchart showing user flow. Return the answer in Markdown only. Here is the code:\n" + $content)
                  }
                ]
              }
            ]
          }' > docs/request.json

          curl -s https://api.openai.com/v1/responses \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d @docs/request.json > docs/output.json
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Generate file
        run: |
          TEXT=$(jq -r '.output[0].content[0].text // .output_text // empty' docs/output.json)

          if [ -n "$TEXT" ]; then
            printf "%s\n" "$TEXT" > docs/developer-guide.md
          else
            cat docs/output.json > docs/developer-guide.md
          fi

      - name: Commit file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash
          git add docs/developer-guide.md docs/output.json docs/request.json
          git commit -m "update developer guide" || echo "no changes"
          git push