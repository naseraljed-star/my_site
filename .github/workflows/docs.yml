name: Generate Docs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create docs folder
        run: mkdir -p docs

      - name: Call OpenAI API
        run: |
          CONTENT=$(jq -Rs . < index.html)

          curl -s https://api.openai.com/v1/responses \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d "{
              \"model\": \"gpt-4.1-mini\",
              \"input\": [
                {
                  \"role\": \"user\",
                  \"content\": [
                    {
                      \"type\": \"input_text\",
                      \"text\": \"Read this website code and generate a short developer guide with: 1) project overview, 2) language used, 3) website purpose, 4) a Mermaid flowchart showing user flow. Here is the code:\"
                    },
                    {
                      \"type\": \"input_text\",
                      \"text\": $CONTENT
                    }
                  ]
                }
              ]
            }" > docs/output.json
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Debug API response
        run: |
          echo "=== Full API Response ==="
          cat docs/output.json
          echo ""
          echo "=== Response Keys ==="
          cat docs/output.json | jq 'keys'
          echo ""
          echo "=== Trying different extraction paths ==="
          echo "Path: .output[0].content[0].text"
          cat docs/output.json | jq -r '.output[0].content[0].text' 2>&1 || echo "FAILED"
          echo ""
          echo "Path: .choices[0].message.content"
          cat docs/output.json | jq -r '.choices[0].message.content' 2>&1 || echo "FAILED"
          echo ""
          echo "Path: .data[0].content[0].text"
          cat docs/output.json | jq -r '.data[0].content[0].text' 2>&1 || echo "FAILED"
          echo ""
          echo "Path: .text"
          cat docs/output.json | jq -r '.text' 2>&1 || echo "FAILED"
          echo ""
          echo "Path: .response"
          cat docs/output.json | jq -r '.response' 2>&1 || echo "FAILED"

      - name: Generate file
        run: |
          # Try multiple paths and use the first that works
          CONTENT=$(cat docs/output.json | jq -r '
            .output[0].content[0].text // 
            .choices[0].message.content // 
            .data[0].content[0].text // 
            .text // 
            .response // 
            "No content found"
          ')
          
          echo "$CONTENT" > docs/developer-guide.md
          
          if [ "$CONTENT" = "No content found" ] || [ -z "$CONTENT" ]; then
            echo "❌ Extraction failed. Check debug output above."
            exit 1
          else
            echo "✅ Successfully extracted content"
          fi

      - name: Commit file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/developer-guide.md
          git commit -m "update developer guide" || echo "no changes"
          git push
