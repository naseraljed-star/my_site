name: Generate Docs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Create docs folder
        run: mkdir -p docs

      - name: Call OpenAI API
        run: |
          curl https://api.openai.com/v1/responses \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d '{
              "model": "gpt-4.1-mini",
              "input": "Explain what this HTML file does and generate a flowchart"
            }' > docs/output.json
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Generate file
        run: |
          echo "# Developer Guide" > docs/developer-guide.md
          echo "This project uses CI/CD with a security check." >> docs/developer-guide.md

      - name: Commit file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/developer-guide.md
          git commit -m "add docs" || echo "no changes"
