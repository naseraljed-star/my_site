name: Generate Docs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create docs folder
        run: mkdir -p docs

      - name: Call OpenAI API
        run: |
          CONTENT=$(jq -Rs . < index.html)

          curl -s https://api.openai.com/v1/responses \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d "{
              \"model\": \"gpt-4.1-mini\",
              \"input\": [
                {
                  \"role\": \"user\",
                  \"content\": [
                    {
                      \"type\": \"input_text\",
                      \"text\": \"Read this website code and generate a short developer guide with: 1) project overview, 2) language used, 3) website purpose, 4) a Mermaid flowchart showing user flow. Here is the code:\"
                    },
                    {
                      \"type\": \"input_text\",
                      \"text\": $CONTENT
                    }
                  ]
                }
              ]
            }" > docs/output.json
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Show API response
        run: |
          echo "=== API RESPONSE ==="
          cat docs/output.json
          echo ""
          echo "=== END OF RESPONSE ==="

      - name: Generate file
        run: |
          # Check if response has error
          if cat docs/output.json | jq -e '.error' > /dev/null; then
            echo "API Error:"
            cat docs/output.json | jq '.error'
            exit 1
          fi
          
          # Try different extraction paths
          echo "Trying to extract content..."
          cat docs/output.json | jq '.'
          
          # Extract with correct path
          jq -r '.output[0].content[0].text' docs/output.json > docs/developer-guide.md 2>&1
          
          echo "Extracted content:"
          cat docs/developer-guide.md

      - name: Commit file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/developer-guide.md
          git commit -m "update developer guide" || echo "no changes"
          git push
