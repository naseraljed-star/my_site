name: Generate Docs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Create docs folder
        run: mkdir -p docs

      - name: Call OpenAI API
        run: |
          CONTENT=$(jq -Rs . < index.html)

          curl https://api.openai.com/v1/responses \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d "{
              \"model\": \"gpt-4.1-mini\",
              \"input\": [
                {
                  \"role\": \"user\",
                  \"content\": [
                    {
                      \"type\": \"input_text\",
                      \"text\": \"Read this website code and generate a short developer guide with: 1) project overview, 2) language used, 3) website purpose, 4) a Mermaid flowchart showing user flow. Here is the code:\"
                    },
                    {
                      \"type\": \"input_text\",
                      \"text\": $CONTENT
                    }
                  ]
                }
              ]
            }" > docs/output.json
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Generate file
        run: |
           jq -r '.output_text' docs/output.json > docs/developer-guide.md

      - name: Commit file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/developer-guide.md
          git commit -m "update developer guide" || echo "no changes"
          git push
