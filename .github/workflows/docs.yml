name: Generate Docs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Create docs folder
        run: mkdir -p docs

      - name: Generate file
        run: |
          echo "# Developer Guide" > docs/developer-guide.md
          echo "This project uses CI/CD with a security check." >> docs/developer-guide.md

      - name: Commit file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/developer-guide.md
          git commit -m "add docs" || echo "no changes"
          
