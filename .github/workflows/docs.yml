name: Generate Docs

on:
  workflow_run:
    workflows: ["Security Check"]
    types:
      - completed

permissions:
  contents: write

jobs:
  docs:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create docs folder
        run: mkdir -p docs

      - name: Call OpenAI API
        run: |
          # Read the HTML content
          CONTENT=$(cat index.html)
          
          # Create JSON payload using Python (more reliable)
          python3 << 'EOF'
          import json
          import os
          
          # Read HTML content
          with open('index.html', 'r') as f:
              html_content = f.read()
          
          # Create the prompt
          prompt = """Read this website code and generate a short developer guide in Markdown only.

Important instructions:
- Use exact visible labels from the HTML.
- Do not replace exact labels with general words.
- Do not invent features or steps that are not present in the HTML.
- The Mermaid flowchart must show the user journey in sequence, starting from landing on the homepage, then viewing the profile content, then reaching the available action buttons or links.
- If multiple buttons or links exist, show them as separate branches from one decision step.
- Use the exact button and link labels as they appear in the HTML.
- Include ALL buttons or links found in the HTML exactly as written.
- Do not limit the flowchart to fixed examples.
- Do not create isolated mini-flows. Keep one connected flowchart.

Return this structure only:
# Developer Guide

## 1. Project Overview
## 2. Language Used
## 3. Website Purpose
## 4. User Flow

Under "User Flow", return a Mermaid flowchart only.

Here is the code:"""
          
          # Create the request payload
          payload = {
              "model": "gpt-4o-mini",
              "messages": [
                  {
                      "role": "user",
                      "content": f"{prompt}\n\n{html_content}"
                  }
              ],
              "max_tokens": 2000,
              "temperature": 0.7
          }
          
          # Write to file
          with open('docs/request.json', 'w') as f:
              json.dump(payload, f, indent=2)
          EOF

          # Make the API call
          curl -s https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d @docs/request.json > docs/output.json
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Generate file
        run: |
          # Extract the content from the response using Python
          python3 << 'EOF'
          import json
          
          try:
              with open('docs/output.json', 'r') as f:
                  response = json.load(f)
              
              # Extract the content
              content = response.get('choices', [{}])[0].get('message', {}).get('content', '')
              
              if content:
                  with open('docs/developer-guide.md', 'w') as f:
                      f.write(content)
                  print("✅ Developer guide generated successfully")
              else:
                  print("❌ No content found in response")
                  print(json.dumps(response, indent=2))
                  exit(1)
          except Exception as e:
              print(f"❌ Error: {e}")
              exit(1)
          EOF

      - name: Fix Mermaid formatting
        run: |
          sed -i 's/``` mermaid/```mermaid/g' docs/developer-guide.md
          sed -i 's/````mermaid/```mermaid/g' docs/developer-guide.md

      - name: Commit file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add docs/developer-guide.md docs/request.json docs/output.json
          git commit -m "update developer guide" || echo "no changes"
          git push || true
