name: Security Check

on: [push]

permissions:
  contents: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run security scan
        id: scan
        run: |
          if [ -n "$(grep -r 'password\|token\|secret' .)" ]; then
            echo "violation=true" >> $GITHUB_OUTPUT
            exit 1
          fi
        continue-on-error: true
      
      - name: Cleanup docs on violation
        if: steps.scan.outputs.violation == 'true'
        run: |
          mkdir -p docs
          rm -f docs/developer-guide.md
          echo "# Security Violation" > docs/developer-guide.md
          echo "" >> docs/developer-guide.md
          echo "⚠️ Documentation blocked: Security check failed." >> docs/developer-guide.md
          echo "Flowchart not shown due to violation." >> docs/developer-guide.md
      
      - name: Commit blocked docs
        if: steps.scan.outputs.violation == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/developer-guide.md
          git commit -m "block docs due to security violation" || echo "no changes"
          git push
      
      - name: Fail workflow if violation
        if: steps.scan.outputs.violation == 'true'
        run: exit 1
